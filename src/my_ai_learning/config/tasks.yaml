research_task:
  description: >
    Research the topic "{topic}" thoroughly.
    Find key facts, recent developments, and 
    important information. Be detailed and accurate.
  expected_output: >
    A detailed research report with at least 
    5 key facts about {topic}.

summarize_task:
  description: >
    Take the research provided in context and 
    summarize it into 5 simple bullet points 
    that anyone can understand easily.
  expected_output: >
    Exactly 5 clear bullet points summarizing 
    the research about {topic}.
  output_file: "output/summary.md"